<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treact</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/1fba0276cf.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <img class="nav__logo" src="TreactAssets/assets/logo.2c489fc453a1783cbadacf914efa3df6.svg" alt="TReact Logo">
                <div class="nav__logo--title">Treact
                </div>
                <ul class="nav__links">
                    <li><a href="#" class="nav__link">About</a></li>
                    <li><a href="#" class="nav__link">Blog</a></li>
                    <li><a href="#" class="nav__link">Pricing</a></li>
                    <li><a href="#" class="nav__link">Contact</a></li>
                </ul>
                <ul class="login">
                    <li><a href="#" class="nav__link log__in">Log in</a></li>
                    <li><a href="#" class="nav__link--primary">Sign Up</a>
                    </li>
                </ul>
            </div>
        </nav>
        <header>
            <div class="header__container">
                <div class="row">
                    <div class="header__description">
                        <h1> <span class="break-here">Beautiful React</span>Templates <span class="purple">for you.</span></h1>
                        <h2>Our templates are easy to setup, understand and customize. Fully modular components with a variety of pages and components.</h2>
                        <form class="email__input">
                            <label for="email>Your email:"></label>
                            <input id="email" type="email" required placeholder="Your E-mail Address" class="email__input--field">
                            <button class="email__input--btn">Get Started</button>
                        </form>
                        <figure class="customer__logo--mask">
                            <img src="TreactAssets/assets/customers-logo-strip.680ac7c2e8ae28161d2c.png" class="customer__logo">
                        </figure>
                    </div>
                    <div class="header__img--mask">
                        <figure>
                            <img src="TreactAssets/assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg" class="header__img">
                        </figure>
                    </div>
                </div>
            </div>
        </header>
    </section>
</body>
</html>
